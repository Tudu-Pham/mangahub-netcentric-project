syntax = "proto3";

package mangahub;

option go_package = "mangahub/proto;mangahubpb";

service MangaService {
  rpc GetManga(GetMangaRequest) returns (MangaResponse);
  rpc SearchManga(SearchMangaRequest) returns (SearchMangaResponse);
  rpc UpdateProgress(UpdateProgressRequest) returns (UpdateProgressResponse);
}

message GetMangaRequest {
  string id = 1;
}

message SearchMangaRequest {
  string query = 1;
}

message Manga {
  string id = 1;
  string title = 2;
  string author = 3;
  string genres = 4;
  string status = 5;
  int32 total_chapters = 6;
  string description = 7;
}

message MangaResponse {
  Manga manga = 1;
}

message SearchMangaResponse {
  repeated Manga results = 1;
}


message UpdateProgressRequest {
  string user_id = 1;
  string manga_id = 2;
  int32 current_chapter = 3;
  string status = 4;
}

message UpdateProgressResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
  string manga_id = 4;
  int32 current_chapter = 5;
  string status = 6;
}